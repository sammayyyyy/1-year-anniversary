<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 1 Year 💙</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background: linear-gradient(135deg, #cce7ff, #e6f2ff);
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    h1 {
      margin-top: 15px;
      color: #3a6ea5;
      font-weight: 600;
      font-family: 'Dancing Script', cursive;
      font-size: 42px;
    }

    .layout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 85vh;
      width: 100%;
      padding: 0 50px;
      box-sizing: border-box;
      gap: 20px;
    }

    /* SIDE IMAGE COLUMNS */
    .side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      height: 100%;
      flex: 0 0 24%;
    }

    .side img {
      width: 200px;
      height: 45%;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    /* CARD */
    .card-container {
      perspective: 1000px;
      height: 100%;
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .card {
      width: 260px;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s;
      cursor: pointer;
      transform-origin: center;
    }

    .card:hover {
      transform: rotateY(-180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      font-size: 18px;
    }

    .front {
      background: white;
      color: #3a6ea5;
    }

    .back {
      background: #3a6ea5;
      color: white;
      transform: rotateY(-180deg);
    }

  </style>
</head>
<body>

  <h1>Happy 1 Year 💙</h1>

  <div class="layout">

    <!-- LEFT SIDE IMAGES -->
    <div class="side">
      <img src="https://via.placeholder.com/300x600" alt="left1">
      <img src="https://via.placeholder.com/300x600" alt="left2">
    </div>

    <!-- CARD -->
    <div class="card-container">
      <div class="card">

        <div class="card-face front">
          <p>Put your main message here 💌</p>
        </div>

        <div class="card-face back">
          <p>Put your hidden message here 💖</p>
        </div>

      </div>
    </div>

    <!-- RIGHT SIDE IMAGES -->
    <div class="side">
      <img src="https://via.placeholder.com/300x600" alt="right1">
      <img src="https://via.placeholder.com/300x600" alt="right2">
    </div>

  </div>

</body>
</html>
